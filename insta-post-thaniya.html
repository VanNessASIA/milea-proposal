<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;background:#0a0a1a;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Noto Sans JP',sans-serif;overflow:hidden;position:relative;}
.bg-line{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(201,168,76,0.03) 0%,transparent 50%,rgba(201,168,76,0.02) 100%);}
.frame{position:absolute;top:40px;left:40px;right:40px;bottom:40px;border:1px solid rgba(201,168,76,0.15);}
.content{position:relative;z-index:1;text-align:center;padding:80px;}
.date{font-size:18px;color:#c9a84c;letter-spacing:8px;margin-bottom:50px;font-weight:400;}
.headline{font-size:58px;font-weight:900;color:#fff;line-height:1.5;margin-bottom:30px;}
.headline em{font-style:normal;color:#c9a84c;}
.sub{font-size:28px;color:#888;line-height:1.8;margin-bottom:60px;font-weight:400;}
.bottom-line{width:60px;height:1px;background:#c9a84c;margin:0 auto 40px;}
.services{font-size:16px;color:#555;letter-spacing:4px;}
.logo{position:absolute;bottom:60px;font-size:14px;color:#333;letter-spacing:6px;}
</style></head><body>
<div class="bg-line"></div>
<div class="frame"></div>
<div class="content">
  <div class="date">2026.03.16</div>
  <div class="headline">タニヤから<br><em>客引き</em>が消えた。</div>
  <div class="sub">あなたの店、<br>検索で出てきますか？</div>
  <div class="bottom-line"></div>
  <div class="services">SNS運用 / サイト制作 / Google Maps最適化</div>
</div>
<div class="logo">VANNESS ASIA</div>
</body></html>
